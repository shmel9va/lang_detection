# version: '3.8'  # Устаревший параметр, удален

services:
  analyzer:
    build: .
    container_name: lang_detection_analyzer
    volumes:
      - ./lang_detection_diploma.csv:/app/lang_detection_diploma.csv:ro
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python scripts/data_processing/analyze_dataset.py

  cleaner:
    build: .
    container_name: lang_detection_cleaner
    volumes:
      - ./lang_detection_diploma.csv:/app/lang_detection_diploma.csv:ro
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python scripts/data_processing/clean_dataset.py

  splitter:
    build: .
    container_name: lang_detection_splitter
    volumes:
      - ./lang_detection_diploma.csv:/app/lang_detection_diploma.csv:ro
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    # Производит train.csv (70%), val.csv (15%), test.csv (15%)
    command: python scripts/data_processing/split_dataset.py

  preprocessor:
    build: .
    container_name: lang_detection_preprocessor
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python scripts/data_processing/preprocess_text.py

  trainer:
    build: .
    container_name: lang_detection_trainer
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python scripts/training/train_fasttext.py

  threshold_finder:
    build: .
    container_name: lang_detection_threshold_finder
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m scripts.training.find_threshold

  trainer_sensitive:
    build: .
    container_name: lang_detection_trainer_sensitive
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m scripts.training.train_sensitive_classifiers

  benchmark:
    build: .
    container_name: lang_detection_benchmark
    volumes:
      - ./output:/app/output
      - ./benchmarks:/app/benchmarks:ro
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python benchmarks/benchmark_speed.py

  evaluator:
    build: .
    container_name: lang_detection_evaluator
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m scripts.training.evaluate_final

  comparer:
    build: .
    container_name: lang_detection_comparer
    volumes:
      - ./output:/app/output
      - ./benchmarks:/app/benchmarks:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python benchmarks/compare_models.py

  baseline_trainer:
    build: .
    container_name: lang_detection_baseline_trainer
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python scripts/training/train_baseline_fasttext.py

  param_searcher:
    build: .
    container_name: lang_detection_param_searcher
    volumes:
      - ./output:/app/output
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m scripts.training.find_optimal_params

  comparer_solutions:
    build: .
    container_name: lang_detection_comparer_solutions
    volumes:
      - ./output:/app/output
      - ./benchmarks:/app/benchmarks:ro
      - ./scripts:/app/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python benchmarks/compare_solutions.py

  eval_real:
    build: .
    container_name: lang_detection_eval_real
    volumes:
      - ./output:/app/output
      - ./benchmarks:/app/benchmarks:ro
      - ./scripts:/app/scripts:ro
      - ./real_data.csv:/app/real_data.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python benchmarks/eval_real_data.py

  collect_errors:
    build: .
    container_name: lang_detection_collect_errors
    volumes:
      - ./output:/app/output
      - ./benchmarks:/app/benchmarks:ro
      - ./scripts:/app/scripts:ro
      - ./real_data.csv:/app/real_data.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
    command: python benchmarks/collect_errors.py
